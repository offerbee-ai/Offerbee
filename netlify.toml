# Netlify build config for the OfferBee web app (pnpm + Turborepo monorepo).
#
# Mirrors apps/web/vercel.json: run `convex deploy` (pushes the backend to the
# PROD Convex deployment) and inject its URL into NEXT_PUBLIC_CONVEX_URL, then
# build the Next.js site. The @netlify/plugin-nextjs runtime handles SSR,
# middleware (proxy.ts), and the .next output.
#
# Required environment variables (set in Netlify → Site config → Env vars):
#   CONVEX_DEPLOY_KEY               prod deploy key (Convex dashboard → prod → Deploy Keys)
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY   pk_… (client)
#   CLERK_SECRET_KEY                    sk_… (server)
# NEXT_PUBLIC_CONVEX_URL is injected automatically by `convex deploy` — do not set it.

[build]
  base = "apps/web"
  command = "cd ../../packages/backend && npx convex deploy --cmd 'cd ../../apps/web && npx next build' --cmd-url-env-var-name NEXT_PUBLIC_CONVEX_URL"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
