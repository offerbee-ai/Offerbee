name: Preview deploy web

# On every PR to main/preview, spin up an isolated Convex PREVIEW backend (own DB;
# its catalog fills from live card search) and publish a Netlify deploy preview of
# the web app built against it, then post the URL back on the PR. Nothing here
# touches production — prod still ships only via deploy-web.yml on merge to main.
#
# Requires (see DEPLOYMENT.md → "Preview deployments"):
#  - GitHub secret CONVEX_PREVIEW_DEPLOY_KEY (a Convex *preview* deploy key)
#  - Convex dashboard: CLERK_JWT_ISSUER_DOMAIN + RAPIDAPI_KEY set as *Preview*
#    environment variables (else auth.config.ts throws on deploy).

on:
  pull_request:
    branches: [main, preview]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-web-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    # Skip fork PRs: secrets aren't exposed to them, so the deploy can't run.
    # The CI workflow (typecheck + build) still gates those.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute preview name
        id: preview
        # Convex preview names are lowercase alphanumeric + hyphens. Slugify the
        # branch (e.g. "fix/Mobile Nav" -> "fix-mobile-nav") and cap the length.
        # The pr<N>- prefix makes the name unique per PR: no cross-PR collisions
        # after truncation, no empty name from all-symbol branches, and no way for
        # a branch literally named "staging" to hijack the staging backend.
        # RAW_REF is passed via env (never ${{ }}-interpolated into the script):
        # branch names may contain quotes/$/backticks — a classic injection vector.
        env:
          RAW_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          slug=$(printf '%s' "$RAW_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-32 \
            | sed -E 's/-+$//')
          name="pr${PR_NUMBER}${slug:+-$slug}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "Preview name: $name"

      - name: Build & deploy preview to Netlify
        id: deploy
        # netlify.toml [context.deploy-preview] runs `convex deploy $CONVEX_PREVIEW_FLAG`
        # then next build. --json prints the deploy result to stdout.
        run: |
          set -o pipefail
          pnpm --package=netlify-cli@17 dlx netlify deploy \
            --build \
            --context deploy-preview \
            --filter web-app \
            --message "PR #${PR_NUMBER} (${HEAD_SHA})" \
            --json | tee deploy-output.json
          url=$(jq -r '.deploy_url // .url // empty' deploy-output.json)
          if [ -z "$url" ]; then
            echo "Could not parse a deploy URL from netlify output" >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # head.sha, not github.sha: on pull_request events github.sha is the
          # ephemeral merge commit, which never appears in the PR's commit list.
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          # PREVIEW deploy key — convex deploy uses it to create the preview backend.
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
          # PR previews are recreated fresh (empty DB) on every push — that's the
          # --preview-create semantics and it's what we want for review isolation.
          # (staging-web.yml passes --preview-name instead, to reuse its backend.)
          CONVEX_PREVIEW_FLAG: --preview-create
          # Unique per-PR name (read with the flag in netlify.toml).
          CONVEX_PREVIEW_NAME: ${{ steps.preview.outputs.name }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          URL: ${{ steps.deploy.outputs.url }}
          PREVIEW_NAME: ${{ steps.preview.outputs.name }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          marker='<!-- convex-preview -->'
          body="$marker
          ### 🔮 Preview deployment ready

          | | |
          | --- | --- |
          | **Web** | ${URL} |
          | **Convex backend** | preview \`${PREVIEW_NAME}\` (isolated DB) |

          <sub>Updated for \`${SHA:0:7}\`. Rebuilds on every push to this PR (the preview DB is recreated empty each time).</sub>"
          cid=$(gh api "repos/${GH_REPO}/issues/${PR}/comments" --paginate \
            -q "map(select(.body|startswith(\"${marker}\")))|.[0].id // empty")
          if [ -n "$cid" ]; then
            gh api -X PATCH "repos/${GH_REPO}/issues/comments/${cid}" -f body="$body"
          else
            gh api -X POST "repos/${GH_REPO}/issues/${PR}/comments" -f body="$body"
          fi
