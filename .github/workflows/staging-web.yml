name: Deploy web to staging

# Staging environment. Every push to the long-lived `preview` branch redeploys
# ONE fixed Convex preview backend (name: "staging") via `--preview-create
# "staging"`, which reuses that named preview (backend + data persist across
# deploys) if it exists and creates it otherwise. This is the single
# preview/validation environment — there is no per-PR preview deploy. Publishes
# to a stable Netlify alias URL (see DEPLOYMENT.md for the URL).
#
# Flow: feature branch -> PR into `preview` (CI only, no deploy) -> merge into
# `preview` (this workflow -> staging) -> PR `preview` into `main` -> prod.
#
# Uses a PREVIEW deploy key + Convex Preview-scope env vars (see DEPLOYMENT.md).
# Lifetime caveat: Convex reclaims preview deployments ~5 days AFTER CREATION
# (14 days on paid plans) regardless of activity. When "staging" is reclaimed,
# the next push recreates it with an EMPTY DB (the catalog re-fills from live
# search). If durable staging data ever matters, staging should become a
# dedicated Convex deployment, not a preview.

on:
  push:
    branches: [preview]
  workflow_dispatch: {}

concurrency:
  group: staging-web
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & deploy to staging
        id: deploy
        # netlify.toml [context.deploy-preview] runs `convex deploy
        # --preview-create "staging"` (reuse the named backend + data each push),
        # then next build. --alias pins a stable Netlify subdomain.
        run: |
          set -o pipefail
          pnpm --package=netlify-cli@17 dlx netlify deploy \
            --build \
            --context deploy-preview \
            --filter web-app \
            --alias staging \
            --message "staging ${GITHUB_SHA}" \
            --json | tee deploy-output.json
          url=$(jq -r '.deploy_url // .url // empty' deploy-output.json)
          if [ -z "$url" ]; then
            echo "Could not parse a deploy URL from netlify output" >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          {
            echo "### Staging deployed"
            echo ""
            echo "- **Web:** ${url}"
            echo "- **Convex backend:** preview \`staging\` (reused between deploys)"
            echo "- Commit: \`${GITHUB_SHA:0:7}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          # PREVIEW deploy key — reused for the staging preview deployment.
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
          # Fixed name -> `--preview-create "staging"` reuses the same preview
          # backend, so its data survives across deploys (see lifetime caveat above).
          CONVEX_PREVIEW_NAME: staging
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
