name: Deploy web to staging

# Staging environment. Every push to the long-lived `preview` branch redeploys
# the dedicated, durable "staging" Convex deployment via a plain `convex deploy`
# (see apps/web/netlify.toml [context.deploy-preview]). Staging is a standing
# deployment (its own project's prod deployment), NOT an ephemeral preview, so
# its backend + data (seeded card catalog, warmed details, any imported prod
# data) persist across every deploy and are never reclaimed. Publishes to a
# stable Netlify alias URL (see DEPLOYMENT.md for the URL).
#
# Flow: feature branch -> PR into `preview` (CI only, no deploy) -> merge into
# `preview` (this workflow -> staging) -> PR `preview` into `main` -> prod.
#
# Uses the staging deployment's deploy key (CONVEX_STAGING_DEPLOY_KEY) + env vars
# set on that deployment (see DEPLOYMENT.md).

on:
  push:
    branches: [preview]
  workflow_dispatch: {}

concurrency:
  group: staging-web
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & deploy to staging
        id: deploy
        # netlify.toml [context.deploy-preview] runs a plain `convex deploy` to
        # the durable staging deployment (backend + data persist each push),
        # then next build. --alias pins a stable Netlify subdomain.
        run: |
          set -o pipefail
          pnpm --package=netlify-cli@17 dlx netlify deploy \
            --build \
            --context deploy-preview \
            --filter web-app \
            --alias staging \
            --message "staging ${GITHUB_SHA}" \
            --json | tee deploy-output.json
          url=$(jq -r '.deploy_url // .url // empty' deploy-output.json)
          if [ -z "$url" ]; then
            echo "Could not parse a deploy URL from netlify output" >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          {
            echo "### Staging deployed"
            echo ""
            echo "- **Web:** ${url}"
            echo "- **Convex backend:** dedicated \`staging\` deployment (durable, data persists)"
            echo "- Commit: \`${GITHUB_SHA:0:7}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          # Deploy key for the dedicated, durable staging Convex deployment (its
          # own project's PROD deploy key). A plain `convex deploy` targets it, so
          # the backend + data persist across every deploy — no reclaim.
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_STAGING_DEPLOY_KEY }}
          # Staging authenticates against a Clerk DEVELOPMENT instance (pk_test),
          # which accepts any origin — so sign-in works on the staging--*.netlify.app
          # URL. (A pk_live prod instance serves clerk.offerbee.ai and rejects any
          # non-offerbee.ai origin, which is why prod keys 400 on the netlify.app URL.)
          # Falls back to the prod keys until the *_PREVIEW dev secrets exist, so the
          # deploy stays green in the meantime. When you add CLERK_*_PREVIEW, also set
          # the Convex Preview-scope CLERK_JWT_ISSUER_DOMAIN to the dev instance issuer
          # (https://<slug>.clerk.accounts.dev), or JWT validation fails.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY_PREVIEW || secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_PREVIEW || secrets.CLERK_SECRET_KEY }}
