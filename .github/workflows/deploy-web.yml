name: Deploy web to Netlify

# Builds + deploys the OfferBee web app from GitHub Actions (free for private
# repos), so we don't need Netlify's paid Git integration for private org repos.
# On push to main it runs the coupled build from netlify.toml — `convex deploy`
# (backend → prod) then `next build` — and ships the result to Netlify via CLI.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & deploy to Netlify
        # netlify-cli ships two bins (ntl, netlify); name the package + bin so
        # pnpm dlx doesn't error with ERR_PNPM_DLX_MULTIPLE_BINS.
        run: >
          pnpm --package=netlify-cli@17 dlx netlify deploy
          --build
          --prod
          --message "Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          # convex deploy (in netlify.toml build) reads this to push to prod:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          # Clerk keys for the Next.js build:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
