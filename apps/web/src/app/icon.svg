<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/>
      <stop offset="1" stop-color="#FF6D00"/>
    </linearGradient>
    <clipPath id="beebody">
      <rect x="146" y="216" width="240" height="140" rx="70"/>
    </clipPath>
  </defs>
  <!-- background -->
  <rect width="512" height="512" rx="116" fill="url(#amber)"/>
  <!-- wings -->
  <ellipse cx="226" cy="164" rx="46" ry="72" transform="rotate(-24 226 164)" fill="#FFFFFF" opacity="0.55"/>
  <ellipse cx="306" cy="164" rx="46" ry="72" transform="rotate(24 306 164)" fill="#FFFFFF" opacity="0.85"/>
  <!-- stinger (connected, soft tip) -->
  <path d="M360 270 Q404 278 412 286 Q404 294 360 302 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="8" stroke-linejoin="round"/>
  <!-- body -->
  <rect x="146" y="216" width="240" height="140" rx="70" fill="#FFFFFF"/>
  <g clip-path="url(#beebody)">
    <rect x="236" y="200" width="30" height="180" fill="#FF6D00" opacity="0.9"/>
    <rect x="296" y="200" width="30" height="180" fill="#FF6D00" opacity="0.9"/>
  </g>
  <!-- eye -->
  <circle cx="196" cy="272" r="13" fill="#FF6D00"/>
  <!-- antennae -->
  <path d="M172 222 Q160 184 132 172" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <circle cx="128" cy="170" r="10" fill="#FFFFFF"/>
</svg>
