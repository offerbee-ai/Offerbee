# Netlify config for the OfferBee web app (pnpm monorepo package `web-app`).
# Deploy is targeted via `netlify deploy --filter web-app`.
#
# Two robustness measures, learned from CI failures:
#  1. `base = "apps/web"` so `publish` and @netlify/plugin-nextjs resolve to this
#     package (not the repo root — Netlify CLI v16 otherwise runs from the
#     workspace root).
#  2. cwd-independent build command: `pnpm --filter` always runs in the target
#     package's directory regardless of where Netlify invokes it, so no fragile
#     `cd ../..` relative paths.
#
# Build is context-specific (see [context.*] below): --prod pushes the backend to
# PROD Convex; --context deploy-preview is used by staging-web.yml to deploy the
# dedicated, durable "staging" Convex deployment (a standing deployment whose
# data persists across every deploy — NOT an ephemeral preview). Both inject
# NEXT_PUBLIC_CONVEX_URL into the web build. Required GitHub Actions secrets:
# CONVEX_DEPLOY_KEY (prod) / CONVEX_STAGING_DEPLOY_KEY (staging),
# NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, CLERK_SECRET_KEY.

[build]
  base = "apps/web"
  # Netlify resolves publish relative to the repo root here (not `base`), so
  # point it at the package's build output explicitly.
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"

# Production (push to main): push the backend to the PROD Convex deployment and
# build the web app against its URL. Selected by `netlify deploy --prod`.
[context.production]
  command = "pnpm --filter @packages/backend exec convex deploy --cmd 'pnpm --filter web-app exec next build' --cmd-url-env-var-name NEXT_PUBLIC_CONVEX_URL"

# Staging: deploy to the dedicated, durable "staging" Convex deployment. This is
# a standing deployment (staging's own project prod deployment), so a plain
# `convex deploy` — same command as prod — targets whatever CONVEX_DEPLOY_KEY
# points at. staging-web.yml sets CONVEX_DEPLOY_KEY to the staging deploy key
# (CONVEX_STAGING_DEPLOY_KEY). Because it is not a preview, the backend + its
# data (seeded card catalog, warmed details) persist across every deploy and are
# never reclaimed. RAPIDAPI_KEY / CLERK_JWT_ISSUER_DOMAIN must be set on that
# staging deployment. Selected by `netlify deploy --context deploy-preview`.
[context.deploy-preview]
  command = "pnpm --filter @packages/backend exec convex deploy --cmd 'pnpm --filter web-app exec next build' --cmd-url-env-var-name NEXT_PUBLIC_CONVEX_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
